name: Build OPPO GKI Kernel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'
    - cron: '0 12 * * 5'
    - cron: '0 12 * * 3'

jobs:
  build:
    name: Compile Kernel
    runs-on: ubuntu-24.04

    steps:
      - name: Configure Fast APT Mirror
        uses: vegardit/fast-apt-mirror.sh@v1

      - name: Make Build Environment
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y kmod cpio binutils cmake binutils-aarch64-linux-gnu git wget pahole automake flex lzop bison gperf build-essential zip curl zlib1g-dev libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip dwarves device-tree-compiler python3 ccache git-lfs gnupg imagemagick libelf-dev libncurses5-dev libsdl1.2-dev gpart fuse2fs e2fsck-static icu-doc rsync adb fastboot libstdc++6 python-is-python3 gcc-aarch64-linux-gnu 
          mkdir -p kernel
      - name: Checkout Kernel Source
        uses: actions/checkout@v6
        with:
          repository: miaizhe/Kernel_oppo_sm7325_Reno10
          path: kernel/msm-5.4
          fetch-depth: 1
          ref: began

      - name: Checkout Modules Source
        uses: actions/checkout@v6
        with:
          repository: oppo-source/android_kernel_modules_and_devicetree_oppo_sm7325
          path: temp_modules
          ref: oppo/sm7325_v_15.0.0_reno10

      - name: Prepare Compiler
        run: |
          mkdir -p compiler
          cd compiler
          
          curl -fL "https://github.com/Rancemxn/android_kernel_oppo_sm7325/releases/download/BuildTool/linux-x86-refs_heads_llvm-r383902b-clang-r383902.tar.gz" -o clang-r383902.tar.gz --connect-timeout 30 --retry 5 --retry-delay 5
          mkdir -p clang-bin
          tar -xzf clang-r383902.tar.gz -C clang-bin
          rm clang-r383902.tar.gz
      - name: Handle Dependencies
        run: |
          mv temp_modules/vendor ./vendor
          mv temp_modules/device ./device
          rm -rf temp_modules
      - name: Set Release Info & Custom Version
        run: |
          BUILD_DATE=$(date +%Y%m%d)
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

      - name: rekernel
        run: |
          cd kernel/msm-5.4
          curl -LSs "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/refs/heads/mainline/Patches/Rekernel/rekernel_patches.sh" -o rekernel_patches.sh
          chmod +x rekernel_patches.sh
          bash rekernel_patches.sh
          curl -LSs "https://raw.githubusercontent.com/miaizhe/OPPO_GKI1.0_TEST/refs/heads/main/rekernel_extra.patch" -o rekernel_extra.patch
          patch -p1 < rekernel_extra.patch || true
          sed -i '1i#include <net/rekernel.h>' drivers/android/binder.c
          sed -i '1i#include <net/rekernel.h>' kernel/signal.c
          sed -i 's/\bSIGNAL\b/REKERNEL_SIGNAL/g' include/net/rekernel.h
          sed -i 's/\bSIGNAL\b/REKERNEL_SIGNAL/g' kernel/signal.c
          sed -i 's/\bSIGNAL\b/REKERNEL_SIGNAL/g' drivers/android/binder.c
          find drivers/net/rekernel/ -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/\bSIGNAL\b/REKERNEL_SIGNAL/g' {} + 2>/dev/null || true
          sed -i 's/#define MIN_USERAPP_UID/\/\/ #define MIN_USERAPP_UID/g' drivers/net/rekernel/rekernel.h
          sed -i 's/#define MAX_SYSTEM_UID/\/\/ #define MAX_SYSTEM_UID/g' drivers/net/rekernel/rekernel.h
          sed -i 's/\bSIGNAL\b/REKERNEL_SIGNAL/g' drivers/net/netfilter/rekernel.c 2>/dev/null || true
          sed -i 's/\bSIGNAL\b/REKERNEL_SIGNAL/g' drivers/net/rekernel/rekernel.c 2>/dev/null || true
          
          # ==== 核心修复：自动全盘扫描，彻底根除 cgroup_freezing 未导出符号导致的 modpost 错误 ====
          cat << 'EOF' > rekernel_patch.h
          #include <linux/kprobes.h>
          #include <linux/sched.h>
          static bool rekernel_cgroup_freezing(struct task_struct *task) {
              static bool (*fn)(struct task_struct *) = NULL;
              if (!fn) {
                  struct kprobe kp = { .symbol_name = "cgroup_freezing" };
                  if (register_kprobe(&kp) == 0) {
                      fn = (void *)kp.addr;
                      unregister_kprobe(&kp);
                  }
              }
              return fn ? fn(task) : false;
          }
          EOF

          # 全自动化动态寻找包含 cgroup_freezing 的相关源码并进行安全注入与精准替换
          find drivers/net/rekernel/ drivers/net/netfilter/ -name "*.c" 2>/dev/null | while read -r file; do
              if grep -q "cgroup_freezing" "$file"; then
                  echo "Patching cgroup_freezing reference in: $file"
                  cat rekernel_patch.h "$file" > temporary.c && mv temporary.c "$file"
                  sed -i -E 's/\bcgroup_freezing\s*\(/rekernel_cgroup_freezing(/g' "$file"
              fi
          done
          rm -f rekernel_patch.h
          # ==============================================================================================
          
      - name: Compile Kernel
        run: |
          export PATH="$(pwd)/compiler/clang-bin/bin:$PATH"
          export CROSS_COMPILE="aarch64-linux-android-"
          export CROSS_COMPILE_ARM32="arm-linux-androideabi-"
          export CLANG_TRIPLE="aarch64-linux-gnu-"
          export CLANG_PATH="$(pwd)/compiler/clang-bin/bin"
          export ARCH="arm64"
          export SUBARCH="arm64"
          cd kernel/msm-5.4
          echo "添加docker补丁中"
          rm fs/overlayfs/util.c
          curl -LSs "https://github.com/miaizhe/Kernel_oppo_sm7325_Reno10/releases/download/boot/util.c" -o fs/overlayfs/util.c
          rm kernel/module.c
          curl -LSs "https://github.com/miaizhe/Kernel_oppo_sm7325_Reno10/releases/download/boot/module.c" -o kernel/module.c
          rm arch/arm64/configs/Reno10-Docker_defconfig
          curl -LSs "https://github.com/miaizhe/Kernel_oppo_sm7325_Reno10/releases/download/boot/Reno10-Docker_defconfig" -o arch/arm64/configs/Reno10-Docker_defconfig
          rm include/linux/sched/user.h
          curl -LSs https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_3_4_5.patch -o 001.GKI-below-6.12-fix_sysvipc_kabi_3_4_5.patch
          curl -LSs https://github.com/miaizhe/Kernel_oppo_sm7325_Reno10/releases/download/boot/user.h -o include/linux/sched/user.h
          patch -p1 < 001.GKI-below-6.12-fix_sysvipc_kabi_3_4_5.patch
          echo "添加docker补丁完成"
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          curl -LSs "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/syscall_hook_patches.sh" -o syscall_hook_patches.sh
          chmod +x syscall_hook_patches.sh
          bash syscall_hook_patches.sh
          make O=out CC="clang" LLVM=1 Reno10-Docker_defconfig
          ./scripts/config --file out/.config \
            -d CONFIG_KSU_TRACEPOINT_HOOK \
            -e CONFIG_KSU_MANUAL_HOOK
          # ==== Enable namespaces for Droidspaces ====
          ./scripts/config --file out/.config \
            -e CONFIG_USER_NS \
            -e CONFIG_PID_NS \
            -e CONFIG_IPC_NS \
            -e CONFIG_CHECKPOINT_RESTORE \
            -e CONFIG_SYSVIPC 
          # ==========================================
          ./scripts/config --file out/.config --enable CONFIG_CGROUP_PIDS
          ./scripts/config --file out/.config --enable CONFIG_CGROUP_IO
          ./scripts/config --file out/.config --enable CONFIG_CPUSETS
          ./scripts/config --file out/.config --enable CONFIG_MEMCG
          ./scripts/config --file out/.config --enable CONFIG_DEVTMPFS
          ./scripts/config --file out/.config --enable CONFIG_DEVTMPFS_MOUNT
          ./scripts/config --file out/.config --enable CONFIG_OVERLAY_FS
          ./scripts/config --file out/.config --enable CONFIG_TMPFS_POSIX_ACL
          ./scripts/config --file out/.config --enable CONFIG_TMPFS_XATTR
          make O=out CC="clang" LLVM=1 -j$(nproc)
      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          sed -i '584s|ui_print " " "Done!";|ui_print " "; ui_print "感谢支持芜夕wuxi内核，刷入完成！"; ui_print "祝你玩的愉快！";|' AnyKernel3/META-INF/com/google/android/update-binary
          
          cp kernel/msm-5.4/out/arch/arm64/boot/Image AnyKernel3/
          mkdir -p AnyKernel3/modules/vendor/lib/modules
          find kernel/msm-5.4/out/ -name "*.ko" -exec cp {} AnyKernel3/modules/vendor/lib/modules/ \;
          
          cd AnyKernel3
          rm anykernel.sh
          wget https://github.com/miaizhe/Kernel_oppo_sm7325_Reno10/releases/download/boot/anykernel.sh
          zip -r9 ../OPPO-GKI-Reno10-${{ env.BUILD_DATE }}.zip * -x .git* README.md *placeholder

      - name: Upload Flashable Kernel
        uses: actions/upload-artifact@v6
        with:
          name: ReSukiSU_Reno10_Docker.img
          path: OPPO-GKI-Reno10-${{ env.BUILD_DATE }}.zip
